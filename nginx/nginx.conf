# Optional single-origin reverse proxy: serves the SPA and proxies the API +
# WebSockets through one port (default 8080). Enable with:
#   docker compose --profile proxy up --build
# Then open http://localhost:8080 and point VITE_API_URL at the same origin.

upstream civicos_backend {
    server backend:8000;
}

upstream civicos_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # --- API ---------------------------------------------------------------
    location ~ ^/(institutions|tickets|files|document-types|listings|sellers|issues|issue-categories|auth|admin|health|docs|redoc|openapi.json) {
        proxy_pass http://civicos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSockets --------------------------------------------------------
    location /ws/ {
        proxy_pass http://civicos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # --- SPA ---------------------------------------------------------------
    location / {
        proxy_pass http://civicos_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
