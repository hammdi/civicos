<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF1F6"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B4F72"/>
      <stop offset="1" stop-color="#163F5B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1B4F72" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="640" height="460" rx="28" fill="url(#sky)"/>

  <!-- Civic building -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="260" height="180" rx="6" fill="#FFFFFF"/>
    <path d="M60 150 L200 86 L340 150 Z" fill="#1B4F72"/>
    <rect x="60" y="150" width="280" height="12" rx="4" fill="#1B4F72"/>
    <rect x="92" y="176" width="14" height="120" fill="#D5E3ED"/>
    <rect x="128" y="176" width="14" height="120" fill="#D5E3ED"/>
    <rect x="164" y="176" width="14" height="120" fill="#D5E3ED"/>
    <rect x="222" y="176" width="14" height="120" fill="#D5E3ED"/>
    <rect x="258" y="176" width="14" height="120" fill="#D5E3ED"/>
    <rect x="294" y="176" width="14" height="120" fill="#D5E3ED"/>
    <rect x="70" y="312" width="260" height="18" rx="4" fill="#27AE60"/>
    <circle cx="200" cy="120" r="9" fill="#27AE60"/>
  </g>

  <!-- Phone with a digital ticket -->
  <g filter="url(#shadow)">
    <rect x="372" y="96" width="190" height="300" rx="26" fill="url(#phone)"/>
    <rect x="388" y="120" width="158" height="252" rx="14" fill="#FFFFFF"/>
    <rect x="450" y="132" width="34" height="6" rx="3" fill="#D5E3ED"/>
    <!-- ticket card -->
    <rect x="404" y="156" width="126" height="92" rx="10" fill="#EAF1F6"/>
    <text x="467" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1B4F72">Your number</text>
    <text x="467" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="34" fill="#2563EB">A-042</text>
    <!-- module rows -->
    <g>
      <rect x="404" y="262" width="126" height="22" rx="6" fill="#2563EB" opacity="0.12"/>
      <circle cx="416" cy="273" r="5" fill="#2563EB"/>
      <rect x="404" y="290" width="126" height="22" rx="6" fill="#EA8A0B" opacity="0.14"/>
      <circle cx="416" cy="301" r="5" fill="#EA8A0B"/>
      <rect x="404" y="318" width="126" height="22" rx="6" fill="#27AE60" opacity="0.14"/>
      <circle cx="416" cy="329" r="5" fill="#27AE60"/>
      <rect x="404" y="346" width="126" height="22" rx="6" fill="#E74C3C" opacity="0.12"/>
      <circle cx="416" cy="357" r="5" fill="#E74C3C"/>
    </g>
  </g>

  <!-- floating check badge -->
  <g filter="url(#shadow)">
    <circle cx="360" cy="360" r="30" fill="#27AE60"/>
    <path d="M347 360 l9 9 l17 -19" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
